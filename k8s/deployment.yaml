apiVersion: apps/v1
kind: Deployment
metadata:
  name: quidenous
  namespace: default
  labels:
    app: quidenous
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quidenous
  template:
    metadata:
      labels:
        app: quidenous
    spec:
      containers:
        - name: quidenous
          image: harbor.alexandrecourand.fr/library/quidenous:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
      imagePullSecrets:
        - name: harbor-registry
---
apiVersion: v1
kind: Service
metadata:
  name: quidenous
  namespace: default
spec:
  selector:
    app: quidenous
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quidenous
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: harbor-harbor-security-headers@kubernetescrd,harbor-harbor-ratelimit@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: quidenous.alexandrecourand.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quidenous
                port:
                  number: 80
  tls:
    - hosts:
        - quidenous.alexandrecourand.fr
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quidenous-redirect
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: harbor-harbor-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: quidenous.alexandrecourand.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quidenous
                port:
                  number: 80
